<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <!-- Graduation cap top -->
  <polygon points="32,14 8,26 32,38 56,26" fill="white" opacity="0.95"/>
  <!-- Graduation cap body -->
  <polygon points="16,28 16,40 32,48 48,40 48,28 32,38" fill="white" opacity="0.75"/>
  <!-- Tassel line -->
  <line x1="48" y1="26" x2="48" y2="42" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.9"/>
  <!-- Tassel ball -->
  <circle cx="48" cy="44" r="3" fill="white" opacity="0.9"/>
</svg>
